<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fujairah Environment Authority - AQMS Login</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: #1a3636; /* Fallback color */
    }

    .login-container {
      display: flex;
      height: 100vh;
      width: 100vw;
      /* Use the exact local background image you save to this folder */
      background-image: url('assets/login-bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }
    
    .bg-overlay {
      position: absolute;
      inset: 0;
      /* The design has a slightly darkened overlay to make the panel pop */
      background: rgba(0, 40, 40, 0.1); 
      z-index: 1;
      pointer-events: none;
    }

    .login-panel {
      width: 587px;
      height: 100%;
      margin-left: 120px; /* Gap from the left edge */
      background: rgba(31, 92, 97, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 4rem;
      color: white;
      position: relative;
      z-index: 10;
      box-shadow: 0 4px 34px 0 rgba(255, 255, 255, 0.45) inset;
    }

    /* Logo area */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 5rem;
      width: 100%;
      justify-content: center;
    }

    .logo-img {
      height: 60px;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-text-ar {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
    }
    
    .logo-text-en {
      font-size: 0.55rem;
      letter-spacing: 0.5px;
      opacity: 0.9;
      font-weight: 500;
      margin-top: 2px;
    }

    /* Form Area */
    .login-form-wrapper {
      width: 100%;
      max-width: 340px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    .login-header h2 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .login-header p {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.75);
    }

    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .input-label {
      font-size: 0.8rem;
      color: white;
      margin-bottom: 0.5rem;
      display: block;
      font-weight: 500;
    }

    .input-glass {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 0.875rem 1rem;
      border-radius: 8px;
      width: 100%;
      outline: none;
      font-size: 0.875rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    
    .input-glass::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .input-glass:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 36px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      width: 20px;
    }
    .password-toggle:hover {
      opacity: 1;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      margin-bottom: 2rem;
      margin-top: 1.5rem;
    }

    /* Custom Checkbox */
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.9);
      user-select: none;
    }

    .checkbox-container input {
      display: none;
    }

    .checkmark {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
    }

    .checkbox-container input:checked ~ .checkmark {
      background: #00b4d8;
      border-color: #00b4d8;
    }

    .checkmark::after {
      content: "";
      display: none;
      width: 4px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .checkbox-container input:checked ~ .checkmark::after {
      display: block;
    }

    .forgot-password {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-password:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      margin-bottom: 1.5rem;
      padding: 0.875rem;
      font-size: 0.95rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, #00b4d8 0%, #02c39a 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover {
      opacity: 0.9;
    }
    .login-btn:active {
      transform: scale(0.98);
    }

    .signup-link {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.8);
    }
    .signup-link a {
      color: #00e5ff;
      text-decoration: none;
      font-weight: 500;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }

    /* Fallback for missing images */
    img {
      color: transparent; /* hides alt text if image broken */
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="bg-overlay"></div>
    
    <div class="login-panel">
      <!-- Logo updated to use the provided image -->
      <div class="logo-container">
        <img src="assets/logo.png" alt="" class="logo-img">
      </div>

      <div class="login-form-wrapper">
        <div class="login-header">
          <h2>Login</h2>
          <p>Please enter your details.</p>
        </div>

        <form action="live-data.html">
          <div class="form-group">
            <label class="input-label">Email</label>
            <input type="email" class="input-glass" placeholder="admin@fea.gov.ae" value="admin@fea.gov.ae" required>
          </div>

          <div class="form-group">
            <label class="input-label">Password</label>
            <input type="password" id="passwordInput" class="input-glass" value="password123" required>
            <div class="password-toggle" id="togglePassword">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox">
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="login-btn">
            Login 
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </form>

        <div class="signup-link">
          Don't have an account? <a href="#">Sign up</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Password Toggle Logic inside HTML to keep it self-contained
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('passwordInput');

      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          
          if (type === 'text') {
            togglePassword.innerHTML = `
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            `;
          } else {
            togglePassword.innerHTML = `
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            `;
          }
        });
      }
    });
  </script>
</body>
</html>
